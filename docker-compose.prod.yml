services:
  postgres:
    image: postgres:16-alpine
    container_name: localkb-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ${DATA_ROOT:-./app-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  meilisearch:
    image: getmeili/meilisearch:v1.15
    container_name: localkb-meilisearch
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ${DATA_ROOT:-./app-data}/meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      target: runner
    image: localkb-app:latest
    container_name: localkb-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ${DATA_ROOT:-./app-data}/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  tools:
    build:
      context: .
      target: tools
    image: localkb-tools:latest
    container_name: localkb-tools
    profiles:
      - ops
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
